name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/ahmyousry/medical-diagnosis-api
  UI_IMAGE:  ghcr.io/ahmyousry/medical-diagnosis-ui

jobs:
  # ── 1. Run tests first ──────────────────────────────────────────
  test:
    uses: ./.github/workflows/test.yml

  # ── 2. Build & push API image ───────────────────────────────────
  build-api:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Build & push UI image ────────────────────────────────────
  build-ui:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # UI lives in a sibling folder — check it out via sparse checkout
          sparse-checkout: |
            ../medical-diagnosis-ui

      - name: Checkout UI repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/medical-diagnosis-ui
          path: medical-diagnosis-ui
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.UI_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: ./medical-diagnosis-ui
          file: ./medical-diagnosis-ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.PUBLIC_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy to VPS via SSH ────────────────────────────────────
  deploy:
    needs: [build-api, build-ui]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull api frontend celery-worker

            # Rolling restart — zero-downtime for stateless services
            docker compose -f docker-compose.prod.yml up -d --no-build --remove-orphans

            # Clean up old images
            docker image prune -f

            echo "✅ Deploy complete — $(date)"
